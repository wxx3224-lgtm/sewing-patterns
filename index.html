<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>缝纫裁片图纸生成工具</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'PingFang SC','Microsoft YaHei','Helvetica Neue',sans-serif;background:#fdf2f4;min-height:100vh}
.wrap{display:flex;min-height:100vh}
aside{width:300px;background:#fff;border-right:1px solid #f5d5d9;padding:16px;display:flex;flex-direction:column;gap:12px;flex-shrink:0;overflow-y:auto;max-height:100vh}
aside h1{font-size:17px;font-weight:600;color:#9d4c5a;letter-spacing:1px}
.tabs{display:flex;gap:0;border:1px solid #f0c4ca;border-radius:8px;overflow:hidden}
.tab{flex:1;padding:7px 0;text-align:center;font-size:12px;cursor:pointer;background:#fff;color:#999;border:none;transition:all .15s}
.tab.active{background:#fff0f3;color:#c27185;font-weight:600}
.tab-panel{display:none;flex-direction:column;gap:8px;flex:1;overflow-y:auto}
.tab-panel.show{display:flex}
.ctrl-row{display:flex;gap:8px;align-items:flex-end}
.ctrl-row>div{flex:1}
label{display:block;font-size:12px;color:#888;margin-bottom:3px}
input[type=number],select,input[type=text]{width:100%;border:1px solid #f0c4ca;border-radius:8px;padding:6px 10px;font-size:13px;outline:none;background:#fff}
input:focus,select:focus{border-color:#d4889a;box-shadow:0 0 0 3px rgba(212,136,154,.15)}
.cat-title{font-size:12px;color:#b5838d;font-weight:600;margin:8px 0 4px;padding-left:2px;letter-spacing:.5px;cursor:pointer;user-select:none;display:flex;align-items:center;gap:4px}
.cat-title::before{content:'▸';font-size:10px;transition:transform .2s;display:inline-block}
.cat-title.open::before{transform:rotate(90deg)}
.cat-items{display:none;flex-direction:column;gap:4px;padding-left:2px}
.cat-items.show{display:flex}
.tpl-card{cursor:pointer;border:1px solid #f5d5d9;border-radius:8px;padding:7px 10px;transition:all .15s}
.tpl-card:hover{transform:translateY(-1px);box-shadow:0 2px 8px rgba(0,0,0,.05)}
.tpl-card.active{border-color:#c27185;background:#fff0f3}
.tpl-name{font-size:12px;font-weight:500;color:#444}
.tpl-desc{font-size:10px;color:#aaa;margin-top:1px}
.lib-card{border:1px solid #f0e0e3;border-radius:8px;padding:8px 10px;transition:all .15s}
.lib-card:hover{box-shadow:0 2px 8px rgba(0,0,0,.05)}
.lib-card.active{border-color:#c27185;background:#fff0f3}
.lib-card .lib-name{font-size:12px;font-weight:500;color:#444}
.lib-card .lib-meta{font-size:10px;color:#aaa;margin-top:2px}
.lib-card .lib-src{font-size:9px;color:#c9a;margin-top:2px}
.lib-badge{display:inline-block;font-size:9px;background:#f5e6e9;color:#b5838d;padding:1px 6px;border-radius:4px;margin-right:4px}
.btn-row{display:flex;gap:8px;margin-top:auto;padding-top:8px;flex-shrink:0}
.btn{flex:1;border:none;border-radius:8px;padding:10px 0;font-size:13px;font-weight:500;cursor:pointer;transition:background .2s}
.btn-print{background:#d4889a;color:#fff}.btn-print:hover{background:#c27185}
.btn-reset{background:#f5e6e9;color:#9d4c5a}.btn-reset:hover{background:#f0d4da}
main{flex:1;display:flex;align-items:flex-start;justify-content:center;padding:24px;overflow:auto}
#canvas-wrap{background:#fff;border-radius:12px;box-shadow:0 2px 16px rgba(0,0,0,.04);border:1px solid #f5d5d9;padding:20px;display:inline-block;max-width:100%;overflow-x:auto}
#canvas-wrap svg{max-width:100%;height:auto}
.mobile-bar{display:none;background:#fff;border-bottom:1px solid #f5d5d9;padding:10px 16px;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.mobile-bar h1{font-size:15px;font-weight:600;color:#9d4c5a}
.mobile-toggle{background:#fff0f3;border:1px solid #f0c4ca;border-radius:8px;padding:6px 14px;font-size:13px;color:#c27185;cursor:pointer}
.mobile-toggle:active{background:#f5d5d9}
@media(max-width:768px){
  .wrap{flex-direction:column}
  aside{width:100%;max-height:none;border-right:none;border-bottom:1px solid #f5d5d9;overflow-y:visible}
  aside.collapsed{display:none}
  .mobile-bar{display:flex}
  aside h1{display:none}
  main{padding:12px}
  #canvas-wrap{padding:10px;border-radius:8px}
  .tab{font-size:11px;padding:8px 0}
  .btn-row{position:sticky;bottom:0;background:#fff;padding:10px 0 4px;border-top:1px solid #f5e6e9}
}
/* iPad 竖屏 (769-1024px): 侧边栏加宽，保持左右布局 */
@media(min-width:769px) and (max-width:1024px){
  aside{width:320px;padding:14px}
  main{padding:16px}
  .tab{font-size:11px;padding:7px 0}
  .tpl-card{padding:8px 10px}
  .tpl-name{font-size:13px}
  .tpl-desc{font-size:11px}
  #canvas-wrap{padding:16px}
}
/* iPad 横屏 / 小笔记本 (1025-1366px): 侧边栏更宽敞 */
@media(min-width:1025px) and (max-width:1366px){
  aside{width:340px}
}
@media print{
  aside,.no-print,.mobile-bar{display:none!important}
  body{background:#fff!important;margin:0;padding:0}
  .wrap{display:block}
  main{padding:5mm;display:block}
  #canvas-wrap{border:none!important;box-shadow:none!important;margin:0!important;padding:0!important;border-radius:0!important;max-width:none!important;overflow:visible!important}
  #canvas-wrap svg{max-width:none!important}
  #svgCanvas{width:auto!important;height:auto!important}
  @page{size:A4;margin:8mm}
}
</style>
</head>
<body>
<div class="wrap">
  <div class="mobile-bar no-print">
    <h1>🧵 裁片图纸工具</h1>
    <div style="display:flex;gap:6px">
      <button class="mobile-toggle" onclick="doPrint()" style="font-size:12px;padding:6px 10px">🖨️</button>
      <button class="mobile-toggle" onclick="togglePanel()">展开面板</button>
    </div>
  </div>
  <aside class="no-print collapsed" id="sidePanel">
    <h1>🧵 裁片图纸工具</h1>
    <div class="tabs">
      <div class="tab active" onclick="switchTab('local')">内置模板</div>
      <div class="tab" onclick="switchTab('online')">在线纸样库</div>
      <div class="tab" onclick="switchTab('parse')">教程解析</div>
    </div>

    <!-- 内置模板面板 -->
    <div id="panelLocal" class="tab-panel show">
      <div class="ctrl-row">
        <div><label>面料类型</label>
          <select id="fabricInput">
            <option value="woven">普通梭织(棉/涤棉/亚麻)</option>
            <option value="thin">薄料(雪纺/真丝/乔其纱)</option>
            <option value="thick">厚料(牛仔/帆布/呢料)</option>
            <option value="knit">针织(平纹针织/罗纹)</option>
          </select>
        </div>
      </div>
      <div class="ctrl-row">
        <div><label>预览缩放</label><select id="scaleInput"><option value="3">小</option><option value="4" selected>中</option><option value="6">大</option></select></div>
        <div style="display:flex;align-items:flex-end;padding-bottom:1px">
          <label style="font-size:11px;white-space:nowrap"><input type="checkbox" id="printMode" style="margin-right:3px"/>打印模式</label>
        </div>
      </div>
      <div style="background:#fff8f5;border:1px solid #f5e0d8;border-radius:8px;padding:8px 10px;font-size:10px;color:#888;line-height:1.6">
        <div id="seamInfo"></div>
      </div>
      <div id="templateList" style="flex:1;overflow-y:auto"></div>
    </div>

    <!-- 在线纸样库面板 -->
    <div id="panelOnline" class="tab-panel">
      <input type="text" id="libSearch" placeholder="搜索纸样名称或分类..." style="margin-bottom:4px"/>
      <div id="libStatus" style="font-size:10px;color:#aaa"></div>
      <div id="libList" style="flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:6px"></div>
    </div>

    <!-- 教程解析面板 -->
    <div id="panelParse" class="tab-panel">
      <p style="font-size:11px;color:#888;margin-bottom:6px">粘贴小红书/教程文字，自动提取裁片尺寸</p>
      <textarea id="parseInput" placeholder="示例：&#10;前片 宽48cm 高62cm ×1&#10;后片 48×64 ×1&#10;袖片 38*58cm 需要2片&#10;领口条 长50 宽4&#10;&#10;也支持：&#10;包身 36×38cm 裁2片&#10;提手 6cm×50cm 2条" style="width:100%;height:140px;border:1px solid #f0c4ca;border-radius:8px;padding:8px;font-size:12px;resize:vertical;outline:none;font-family:inherit"></textarea>
      <button class="btn" style="background:#d4889a;color:#fff;margin-top:6px;padding:8px" onclick="parseText()">🔍 解析并生成图纸</button>
      <div id="parseResult" style="margin-top:8px;font-size:11px;color:#666"></div>
      <div id="parseList" style="flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:4px;margin-top:6px"></div>
    </div>

    <div class="btn-row">
      <button class="btn btn-reset" onclick="fabricEl.value='woven';updateSeamInfo();draw()">重置面料</button>
      <button class="btn btn-print" onclick="doPrint()">🖨️ 打印</button>
      <button class="btn" style="background:#f5e6e9;color:#9d4c5a;flex:.6" onclick="exportImage()">📥 导出</button>
    </div>
  </aside>
  <main><div id="canvas-wrap"><svg id="svgCanvas" xmlns="http://www.w3.org/2000/svg"></svg></div></main>
</div>

let cur={ci:0,ii:0};
const fabricEl=document.getElementById('fabricInput');
const scaleEl=document.getElementById('scaleInput');
const svgEl=document.getElementById('svgCanvas');
const listEl=document.getElementById('templateList');
const seamInfoEl=document.getElementById('seamInfo');

// 缝份计算系统（基于文档：面料×部位）
const SEAM_TABLE={
  // seamType: {fabric: width_cm}
  side:    {woven:1.0, thin:1.2, thick:0.8, knit:0.8},   // 侧缝、肩缝、摆缝
  armhole: {woven:1.0, thin:1.2, thick:1.0, knit:0.8},   // 袖窿、领窝
  hem:     {woven:2.5, thin:3.0, thick:2.0, knit:2.0},   // 下摆、袖口折边
  waist:   {woven:3.0, thin:3.0, thick:2.5, knit:2.5},   // 腰头折边
  curve:   {woven:0.7, thin:0.8, thick:0.6, knit:0.6},   // 弧形/转角(领角、圆角)
  topstitch:{woven:0.8,thin:1.0, thick:0.7, knit:0.7},   // 明线止口(门襟、袋盖)
  overlock:{woven:1.0, thin:1.2, thick:0.8, knit:0.8},   // 包缝
  fold:    {woven:0.0, thin:0.0, thick:0.0, knit:0.0},   // 对折线(无缝份)
  strap:   {woven:1.0, thin:1.0, thick:0.8, knit:0.8},   // 带子(对折缝合)
};

function getSeam(seamType){
  const fabric=fabricEl.value;
  return SEAM_TABLE[seamType]?.[fabric] ?? SEAM_TABLE.side[fabric];
}

function updateSeamInfo(){
  const fabric=fabricEl.value;
  const names={side:'侧缝/肩缝',armhole:'袖窿/领窝',hem:'下摆折边',waist:'腰头',curve:'弧形转角',topstitch:'明线止口',overlock:'包缝',strap:'带子'};
  let html='';
  for(const[k,v]of Object.entries(names)){
    html+=`<span style="display:inline-block;margin:1px 6px 1px 0"><b>${v}</b> ${SEAM_TABLE[k][fabric]}cm</span>`;
  }
  seamInfoEl.innerHTML=html;
}

PROJECTS.forEach((c,ci)=>{
  const h=document.createElement('div');
  h.className='cat-title'+(ci===0?' open':'');
  h.textContent=c.cat;
  const box=document.createElement('div');
  box.className='cat-items'+(ci===0?' show':'');
  h.onclick=()=>{h.classList.toggle('open');box.classList.toggle('show');};
  listEl.appendChild(h);
  c.items.forEach((t,ii)=>{
    const d=document.createElement('div');
    d.className='tpl-card'+(ci===0&&ii===0?' active':'');
    d.innerHTML=`<div class="tpl-name">${t.name}</div><div class="tpl-desc">${t.desc}</div>`;
    d.onclick=()=>{cur={ci,ii};libActive=null;document.querySelectorAll('.tpl-card').forEach(x=>x.classList.remove('active'));d.classList.add('active');draw();};
    box.appendChild(d);
  });
  listEl.appendChild(box);
});

const printEl=document.getElementById('printMode');

function draw(){
  if(!cur&&libActive){drawOnline(libActive);return;}
  if(!cur) return;
  updateSeamInfo();
  const isPrint=printEl.checked;
  const PX_PER_CM=isPrint?10:parseInt(scaleEl.value)||4;
  const proj=PROJECTS[cur.ci].items[cur.ii];
  const pieces=proj.pieces;
  const gap=isPrint?15:40;
  const mg=isPrint?20:60;
  const hasSeam=pieces.some(p=>getSeam(p.st||'side')>0);
  const seamExtra=hasSeam?(isPrint?8:24):0;
  const pieceBoxes=[];

  pieces.forEach(p=>{
    const seam=getSeam(p.st||'side');
    const sp=seam*PX_PER_CM;
    const tw=p.nw*PX_PER_CM+sp*2;
    const th=p.nh*PX_PER_CM+sp*2;
    pieceBoxes.push({p,tw,th,sp});
  });

  // A4 printable area in mm: ~194 x ~277 (with 8mm margins)
  const maxRowW=isPrint?194*10/10:Math.min(900,window.innerWidth-(window.innerWidth>768?380:40));
  const rows=[];
  let rowItems=[],rowW=0,rowH=0;
  pieceBoxes.forEach(b=>{
    const bw=b.tw+mg+seamExtra;
    if(rowW+bw>maxRowW && rowItems.length>0){
      rows.push({items:rowItems,w:rowW,h:rowH});
      rowItems=[];rowW=0;rowH=0;
    }
    rowItems.push(b);
    rowW+=bw;
    rowH=Math.max(rowH,b.th);
  });
  if(rowItems.length) rows.push({items:rowItems,w:rowW,h:rowH});

  const titleH=isPrint?12:40;
  const footerH=isPrint?8:30;
  const testSquareH=isPrint?65:0; // space for 5cm test square
  const rowGap=isPrint?mg+8:mg+20;
  const legendH=isPrint?25:70;
  const totalH=titleH+10+rows.reduce((s,r)=>s+r.h+rowGap,0)+legendH+footerH+testSquareH;
  const totalW=Math.max(isPrint?194:600,...rows.map(r=>r.w+mg*2));

  if(isPrint){
    // Use mm units for 1:1 printing
    svgEl.setAttribute('width',totalW+'mm');
    svgEl.setAttribute('height',totalH+'mm');
  }else{
    svgEl.setAttribute('width',totalW);
    svgEl.setAttribute('height',totalH);
  }
  svgEl.setAttribute('viewBox',`0 0 ${totalW} ${totalH}`);

  let s=`<style>text{font-family:'PingFang SC','Microsoft YaHei',sans-serif}</style>`;

  // title
  const fs=isPrint?4:16, fs2=isPrint?3:11;
  s+=`<text x="${totalW/2}" y="${isPrint?5:26}" text-anchor="middle" font-size="${fs}" fill="#5a3e3e" font-weight="600">${proj.name}</text>`;
  const fabricName={woven:'普通梭织',thin:'薄料',thick:'厚料',knit:'针织'}[fabricEl.value];
  s+=`<text x="${totalW/2}" y="${isPrint?10:40}" text-anchor="middle" font-size="${fs2}" fill="#b5838d">${proj.desc} ｜ ${fabricName} · 缝份按部位自动分配</text>`;

  let cy=titleH+5;

  rows.forEach(row=>{
    let cx=Math.max(mg,(totalW-row.w)/2);
    row.items.forEach(b=>{
      const{p,tw,th,sp}=b;
      const seam=getSeam(p.st||'side');
      const ox=cx+sp;
      const oy=cy+sp;
      const seamNames={side:'侧缝',armhole:'袖窿',hem:'折边',waist:'腰头',curve:'弧形',topstitch:'明线',overlock:'包缝',fold:'对折',strap:'带子'};

      if(seam>0){
        // 专业纸样画法：
        // 外轮廓（裁剪线）= 粗实线，沿净样外扩seam距离
        // 内轮廓（缝合线）= 细虚线，即净样本身
        // 用 stroke-width=seam*2 的实线画外轮廓，再用白色填充盖住内部
        const sw=seam*2; // in cm (path坐标单位)
        s+=`<g transform="translate(${ox},${oy}) scale(${PX_PER_CM})">`;
        // 裁剪线：粗实线外轮廓
        s+=`<path d="${p.path}" fill="none" stroke="#5a3e3e" stroke-width="${sw}" stroke-linejoin="round" stroke-linecap="round"/>`;
        // 白色填充盖住内半部分stroke
        s+=`<path d="${p.path}" fill="${isPrint?'#fff':'#fffbfb'}" stroke="none"/>`;
        s+=`</g>`;
      }

      // 缝合线（净样轮廓）：细虚线
      s+=`<g transform="translate(${ox},${oy}) scale(${PX_PER_CM})">`;
      if(seam>0){
        s+=`<path d="${p.path}" fill="none" stroke="#5a3e3e" stroke-width="${(isPrint?.04:.6)/PX_PER_CM}" stroke-dasharray="${(isPrint?1.5:4)/PX_PER_CM},${(isPrint?1:2.5)/PX_PER_CM}" stroke-linejoin="round"/>`;
      } else {
        s+=`<path d="${p.path}" fill="${isPrint?'none':'#fffbfb'}" stroke="#5a3e3e" stroke-width="${(isPrint?.08:1.2)/PX_PER_CM}" stroke-linejoin="round"/>`;
      }
      s+=`</g>`;

      // grain arrow
      const ax=ox+p.nw*PX_PER_CM/2;
      const ay1=oy+p.nh*PX_PER_CM*.25;
      const ay2=oy+p.nh*PX_PER_CM*.65;
      const minArrow=isPrint?10:30;
      if(p.nh*PX_PER_CM>minArrow){
        s+=`<line x1="${ax}" y1="${ay1}" x2="${ax}" y2="${ay2}" stroke="#ccc" stroke-width="${isPrint?.15:.8}"/>`;
        const as=isPrint?1.5:5;
        s+=`<polygon points="${ax},${ay1-as} ${ax-as*.6},${ay1+as*.4} ${ax+as*.6},${ay1+as*.4}" fill="#ccc"/>`;
      }

      // label
      const lfs=isPrint?3:12, nfs=isPrint?2.2:9;
      const qtyStr=p.qty>1?` ×${p.qty}`:'';
      s+=`<text x="${ox+p.nw*PX_PER_CM/2}" y="${oy+p.nh*PX_PER_CM/2-lfs*.4}" text-anchor="middle" font-size="${lfs}" fill="#5a3e3e" font-weight="600" dominant-baseline="middle">${p.label}${qtyStr}</text>`;
      if(p.notes)
        s+=`<text x="${ox+p.nw*PX_PER_CM/2}" y="${oy+p.nh*PX_PER_CM/2+lfs*.6}" text-anchor="middle" font-size="${nfs}" fill="#b5838d" dominant-baseline="middle">${p.notes}</text>`;
      // seam type label
      const seamLabel=seam>0?`${seamNames[p.st]||''}缝份 ${seam}cm`:'无缝份';
      s+=`<text x="${ox+p.nw*PX_PER_CM/2}" y="${oy+p.nh*PX_PER_CM/2+lfs*1.5}" text-anchor="middle" font-size="${isPrint?1.8:8}" fill="#d4889a" dominant-baseline="middle">${seamLabel}</text>`;

      // dimensions
      const dimC='#777',dfs=isPrint?2.2:9,doff=isPrint?3:12,dtoff=isPrint?5:18,dsw=isPrint?.1:.6;
      // width on top
      s+=`<line x1="${ox}" y1="${oy-doff}" x2="${ox+p.nw*PX_PER_CM}" y2="${oy-doff}" stroke="${dimC}" stroke-width="${dsw}"/>`;
      s+=`<line x1="${ox}" y1="${oy-doff-1.5}" x2="${ox}" y2="${oy-doff+1.5}" stroke="${dimC}" stroke-width="${dsw}"/>`;
      s+=`<line x1="${ox+p.nw*PX_PER_CM}" y1="${oy-doff-1.5}" x2="${ox+p.nw*PX_PER_CM}" y2="${oy-doff+1.5}" stroke="${dimC}" stroke-width="${dsw}"/>`;
      s+=`<text x="${ox+p.nw*PX_PER_CM/2}" y="${oy-dtoff}" text-anchor="middle" font-size="${dfs}" fill="${dimC}">${p.nw}cm</text>`;
      // height on left
      s+=`<line x1="${ox-doff}" y1="${oy}" x2="${ox-doff}" y2="${oy+p.nh*PX_PER_CM}" stroke="${dimC}" stroke-width="${dsw}"/>`;
      s+=`<line x1="${ox-doff-1.5}" y1="${oy}" x2="${ox-doff+1.5}" y2="${oy}" stroke="${dimC}" stroke-width="${dsw}"/>`;
      s+=`<line x1="${ox-doff-1.5}" y1="${oy+p.nh*PX_PER_CM}" x2="${ox-doff+1.5}" y2="${oy+p.nh*PX_PER_CM}" stroke="${dimC}" stroke-width="${dsw}"/>`;
      s+=`<text x="${ox-dtoff}" y="${oy+p.nh*PX_PER_CM/2}" text-anchor="middle" font-size="${dfs}" fill="${dimC}" dominant-baseline="middle" transform="rotate(-90,${ox-dtoff},${oy+p.nh*PX_PER_CM/2})">${p.nh}cm</text>`;

      if(seam>0){
        const sfs=isPrint?2:8;
        const seamTW=(p.nw+seam*2).toFixed(1), seamTH=(p.nh+seam*2).toFixed(1);
        // seam width dimension below
        s+=`<line x1="${cx}" y1="${cy+th+doff}" x2="${cx+tw}" y2="${cy+th+doff}" stroke="#b5838d" stroke-width="${dsw}"/>`;
        s+=`<line x1="${cx}" y1="${cy+th+doff-1.5}" x2="${cx}" y2="${cy+th+doff+1.5}" stroke="#b5838d" stroke-width="${dsw}"/>`;
        s+=`<line x1="${cx+tw}" y1="${cy+th+doff-1.5}" x2="${cx+tw}" y2="${cy+th+doff+1.5}" stroke="#b5838d" stroke-width="${dsw}"/>`;
        s+=`<text x="${cx+tw/2}" y="${cy+th+dtoff}" text-anchor="middle" font-size="${dfs}" fill="#b5838d">${seamTW}cm</text>`;
        // seam height dimension right
        s+=`<line x1="${cx+tw+doff}" y1="${cy}" x2="${cx+tw+doff}" y2="${cy+th}" stroke="#b5838d" stroke-width="${dsw}"/>`;
        s+=`<line x1="${cx+tw+doff-1.5}" y1="${cy}" x2="${cx+tw+doff+1.5}" y2="${cy}" stroke="#b5838d" stroke-width="${dsw}"/>`;
        s+=`<line x1="${cx+tw+doff-1.5}" y1="${cy+th}" x2="${cx+tw+doff+1.5}" y2="${cy+th}" stroke="#b5838d" stroke-width="${dsw}"/>`;
        s+=`<text x="${cx+tw+dtoff}" y="${cy+th/2}" text-anchor="middle" font-size="${dfs}" fill="#b5838d" dominant-baseline="middle" transform="rotate(-90,${cx+tw+dtoff},${cy+th/2})">${seamTH}cm</text>`;
      }

      cx+=tw+gap;
    });
    cy+=row.h+rowGap;
  });

  // Test square (print mode only)
  if(isPrint){
    const sqX=totalW-60, sqY=cy+2;
    const sq=50; // 5cm = 50mm
    s+=`<rect x="${sqX}" y="${sqY}" width="${sq}" height="${sq}" fill="none" stroke="#333" stroke-width=".3"/>`;
    // grid lines every 1cm
    for(let i=1;i<5;i++){
      s+=`<line x1="${sqX+i*10}" y1="${sqY}" x2="${sqX+i*10}" y2="${sqY+sq}" stroke="#ccc" stroke-width=".1"/>`;
      s+=`<line x1="${sqX}" y1="${sqY+i*10}" x2="${sqX+sq}" y2="${sqY+i*10}" stroke="#ccc" stroke-width=".1"/>`;
    }
    s+=`<text x="${sqX+sq/2}" y="${sqY-2}" text-anchor="middle" font-size="2.5" fill="#333">校验方格 5×5cm</text>`;
    s+=`<text x="${sqX+sq/2}" y="${sqY+sq+4}" text-anchor="middle" font-size="2" fill="#999">打印后请用尺量此方格，确认为5cm×5cm</text>`;
    s+=`<text x="${sqX+sq/2}" y="${sqY+sq+7}" text-anchor="middle" font-size="2" fill="#999">打印设置：缩放100%，无边距或最小边距</text>`;
  }

  // 图例 legend
  const lgX=isPrint?mg:mg;
  const lgY=cy+(isPrint?2:10);
  const lgFs=isPrint?2.5:10;
  const lgGap=isPrint?5:18;
  const lgLw=isPrint?.3:.8;
  const lgLen=isPrint?10:30;
  // 裁剪线
  s+=`<line x1="${lgX}" y1="${lgY}" x2="${lgX+lgLen}" y2="${lgY}" stroke="#5a3e3e" stroke-width="${lgLw*2}"/>`;
  s+=`<text x="${lgX+lgLen+4}" y="${lgY}" font-size="${lgFs}" fill="#5a3e3e" dominant-baseline="middle">—— 裁剪线（沿此线剪）</text>`;
  // 缝合线
  s+=`<line x1="${lgX}" y1="${lgY+lgGap}" x2="${lgX+lgLen}" y2="${lgY+lgGap}" stroke="#5a3e3e" stroke-width="${lgLw}" stroke-dasharray="${isPrint?'1.5,1':'4,2.5'}"/>`;
  s+=`<text x="${lgX+lgLen+4}" y="${lgY+lgGap}" font-size="${lgFs}" fill="#5a3e3e" dominant-baseline="middle">- - - 缝合线（沿此线缝）</text>`;
  // 纱向
  s+=`<line x1="${lgX}" y1="${lgY+lgGap*2}" x2="${lgX+lgLen}" y2="${lgY+lgGap*2}" stroke="#ccc" stroke-width="${lgLw}"/>`;
  const arSz=isPrint?1.5:4;
  s+=`<polygon points="${lgX},${lgY+lgGap*2} ${lgX+arSz},${lgY+lgGap*2-arSz*.6} ${lgX+arSz},${lgY+lgGap*2+arSz*.6}" fill="#ccc"/>`;
  s+=`<text x="${lgX+lgLen+4}" y="${lgY+lgGap*2}" font-size="${lgFs}" fill="#999" dominant-baseline="middle">↕ 纱向（布纹方向）</text>`;

  // footer
  const ffs=isPrint?2.5:10;
  if(hasSeam)
    s+=`<text x="${totalW/2}" y="${totalH-(isPrint?3:10)}" text-anchor="middle" font-size="${ffs}" fill="#b5838d">- - - 虚线为缝份线（按部位自动分配 · 缝份沿轮廓等距外扩）- - -</text>`;

  svgEl.innerHTML=s;
}

fabricEl.addEventListener('change',()=>{updateSeamInfo();draw();});
scaleEl.addEventListener('change',draw);
printEl.addEventListener('change',draw);

// === Tab switching ===
function switchTab(tab){
  document.querySelectorAll('.tab').forEach((t,i)=>{
    const tabs=['local','online','parse'];
    t.classList.toggle('active',tabs[i]===tab);
  });
  document.getElementById('panelLocal').classList.toggle('show',tab==='local');
  document.getElementById('panelOnline').classList.toggle('show',tab==='online');
  document.getElementById('panelParse').classList.toggle('show',tab==='parse');
  if(tab==='online') loadLibrary();
}

// === Online pattern library ===
let libData=null;
let libActive=null; // currently selected online pattern
const libList=document.getElementById('libList');
const libStatus=document.getElementById('libStatus');
const libSearch=document.getElementById('libSearch');

function useOnlinePattern(p){
  libActive=p;
  // highlight active card
  libList.querySelectorAll('.lib-card').forEach(c=>c.classList.remove('active'));
  event.currentTarget.classList.add('active');
  // deselect local template
  document.querySelectorAll('.tpl-card').forEach(c=>c.classList.remove('active'));
  cur=null;
  drawOnline(p);
  collapseOnMobile();
}

function rectPath(w,h){return `M0,0 L${w},0 L${w},${h} L0,${h} Z`;}

function drawOnline(p){
  if(!p.pieces||!p.pieces.length) return;
  const isPrint=printEl.checked;
  const PX=isPrint?10:parseInt(scaleEl.value)||4;
  const gap=isPrint?15:40;
  const mg=isPrint?20:60;
  const defaultSeam=getSeam('side');
  const seamExtra=defaultSeam>0?(isPrint?8:24):0;

  const boxes=p.pieces.map(pc=>{
    const seam=getSeam(pc.st||'side');
    const sp=seam*PX;
    return{pc,tw:pc.w*PX+sp*2,th:pc.h*PX+sp*2,sp};
  });

  const maxRowW=isPrint?194:Math.min(900,window.innerWidth-(window.innerWidth>768?380:40));
  const rows=[];
  let ri=[],rw=0,rh=0;
  boxes.forEach(b=>{
    const bw=b.tw+mg+seamExtra;
    if(rw+bw>maxRowW&&ri.length){rows.push({items:ri,w:rw,h:rh});ri=[];rw=0;rh=0;}
    ri.push(b);rw+=bw;rh=Math.max(rh,b.th);
  });
  if(ri.length) rows.push({items:ri,w:rw,h:rh});

  const titleH=isPrint?12:40;
  const footerH=isPrint?8:30;
  const testH=isPrint?65:0;
  const rowGap=isPrint?mg+8:mg+20;
  const legendH=isPrint?25:70;
  const totalH=titleH+10+rows.reduce((s,r)=>s+r.h+rowGap,0)+legendH+footerH+testH;
  const totalW=Math.max(isPrint?194:600,...rows.map(r=>r.w+mg*2));

  if(isPrint){svgEl.setAttribute('width',totalW+'mm');svgEl.setAttribute('height',totalH+'mm');}
  else{svgEl.setAttribute('width',totalW);svgEl.setAttribute('height',totalH);}
  svgEl.setAttribute('viewBox',`0 0 ${totalW} ${totalH}`);

  let s=`<style>text{font-family:'PingFang SC','Microsoft YaHei',sans-serif}</style>`;
  const fs=isPrint?4:16,fs2=isPrint?3:11;
  s+=`<text x="${totalW/2}" y="${isPrint?5:26}" text-anchor="middle" font-size="${fs}" fill="#5a3e3e" font-weight="600">${p.name}</text>`;
  s+=`<text x="${totalW/2}" y="${isPrint?10:40}" text-anchor="middle" font-size="${fs2}" fill="#b5838d">${p.description||''} · ${p.source||''}</text>`;

  let cy=titleH+5;
  rows.forEach(row=>{
    let cx=Math.max(mg,(totalW-row.w)/2);
    row.items.forEach(b=>{
      const{pc,tw,th,sp}=b;
      const seam=getSeam(pc.st||'side');
      const ox=cx+sp,oy=cy+sp;
      if(seam>0){
        const sw=seam*2;
        s+=`<g transform="translate(${ox},${oy}) scale(${PX})"><path d="${rectPath(pc.w,pc.h)}" fill="none" stroke="#5a3e3e" stroke-width="${sw}" stroke-linejoin="round" stroke-linecap="round"/></g>`;
        s+=`<g transform="translate(${ox},${oy}) scale(${PX})"><path d="${rectPath(pc.w,pc.h)}" fill="${isPrint?'#fff':'#fffbfb'}" stroke="none"/></g>`;
      }
      s+=`<g transform="translate(${ox},${oy}) scale(${PX})"><path d="${rectPath(pc.w,pc.h)}" fill="${seam>0?'none':(isPrint?'none':'#fffbfb')}" stroke="#5a3e3e" stroke-width="${seam>0?(isPrint?.04:.6)/PX:(isPrint?.08:1.2)/PX}" ${seam>0?`stroke-dasharray="${(isPrint?1.5:4)/PX},${(isPrint?1:2.5)/PX}"`:''}  stroke-linejoin="round"/></g>`;

      // grain arrow
      const ax=ox+pc.w*PX/2,ay1=oy+pc.h*PX*.25,ay2=oy+pc.h*PX*.65;
      if(pc.h*PX>(isPrint?10:30)){
        s+=`<line x1="${ax}" y1="${ay1}" x2="${ax}" y2="${ay2}" stroke="#ccc" stroke-width="${isPrint?.15:.8}"/>`;
        const as=isPrint?1.5:5;
        s+=`<polygon points="${ax},${ay1-as} ${ax-as*.6},${ay1+as*.4} ${ax+as*.6},${ay1+as*.4}" fill="#ccc"/>`;
      }

      // label
      const lfs=isPrint?3:12,nfs=isPrint?2.2:9;
      const qtyStr=pc.qty>1?` ×${pc.qty}`:'';
      s+=`<text x="${ox+pc.w*PX/2}" y="${oy+pc.h*PX/2-lfs*.4}" text-anchor="middle" font-size="${lfs}" fill="#5a3e3e" font-weight="600" dominant-baseline="middle">${pc.label}${qtyStr}</text>`;
      s+=`<text x="${ox+pc.w*PX/2}" y="${oy+pc.h*PX/2+lfs*.6}" text-anchor="middle" font-size="${nfs}" fill="#b5838d" dominant-baseline="middle">${pc.w}×${pc.h}cm</text>`;

      // dimensions
      const dimC='#777',dfs=isPrint?2.2:9,doff=isPrint?3:12,dtoff=isPrint?5:18,dsw=isPrint?.1:.6;
      s+=`<line x1="${ox}" y1="${oy-doff}" x2="${ox+pc.w*PX}" y2="${oy-doff}" stroke="${dimC}" stroke-width="${dsw}"/>`;
      s+=`<line x1="${ox}" y1="${oy-doff-1.5}" x2="${ox}" y2="${oy-doff+1.5}" stroke="${dimC}" stroke-width="${dsw}"/>`;
      s+=`<line x1="${ox+pc.w*PX}" y1="${oy-doff-1.5}" x2="${ox+pc.w*PX}" y2="${oy-doff+1.5}" stroke="${dimC}" stroke-width="${dsw}"/>`;
      s+=`<text x="${ox+pc.w*PX/2}" y="${oy-dtoff}" text-anchor="middle" font-size="${dfs}" fill="${dimC}">${pc.w}cm</text>`;
      s+=`<line x1="${ox-doff}" y1="${oy}" x2="${ox-doff}" y2="${oy+pc.h*PX}" stroke="${dimC}" stroke-width="${dsw}"/>`;
      s+=`<line x1="${ox-doff-1.5}" y1="${oy}" x2="${ox-doff+1.5}" y2="${oy}" stroke="${dimC}" stroke-width="${dsw}"/>`;
      s+=`<line x1="${ox-doff-1.5}" y1="${oy+pc.h*PX}" x2="${ox-doff+1.5}" y2="${oy+pc.h*PX}" stroke="${dimC}" stroke-width="${dsw}"/>`;
      s+=`<text x="${ox-dtoff}" y="${oy+pc.h*PX/2}" text-anchor="middle" font-size="${dfs}" fill="${dimC}" dominant-baseline="middle" transform="rotate(-90,${ox-dtoff},${oy+pc.h*PX/2})">${pc.h}cm</text>`;

      if(seam>0){
        const seamTW=(pc.w+seam*2).toFixed(1), seamTH=(pc.h+seam*2).toFixed(1);
        s+=`<line x1="${cx}" y1="${cy+th+doff}" x2="${cx+tw}" y2="${cy+th+doff}" stroke="#b5838d" stroke-width="${dsw}"/>`;
        s+=`<line x1="${cx}" y1="${cy+th+doff-1.5}" x2="${cx}" y2="${cy+th+doff+1.5}" stroke="#b5838d" stroke-width="${dsw}"/>`;
        s+=`<line x1="${cx+tw}" y1="${cy+th+doff-1.5}" x2="${cx+tw}" y2="${cy+th+doff+1.5}" stroke="#b5838d" stroke-width="${dsw}"/>`;
        s+=`<text x="${cx+tw/2}" y="${cy+th+dtoff}" text-anchor="middle" font-size="${dfs}" fill="#b5838d">${seamTW}cm</text>`;
        s+=`<line x1="${cx+tw+doff}" y1="${cy}" x2="${cx+tw+doff}" y2="${cy+th}" stroke="#b5838d" stroke-width="${dsw}"/>`;
        s+=`<line x1="${cx+tw+doff-1.5}" y1="${cy}" x2="${cx+tw+doff+1.5}" y2="${cy}" stroke="#b5838d" stroke-width="${dsw}"/>`;
        s+=`<line x1="${cx+tw+doff-1.5}" y1="${cy+th}" x2="${cx+tw+doff+1.5}" y2="${cy+th}" stroke="#b5838d" stroke-width="${dsw}"/>`;
        s+=`<text x="${cx+tw+dtoff}" y="${cy+th/2}" text-anchor="middle" font-size="${dfs}" fill="#b5838d" dominant-baseline="middle" transform="rotate(-90,${cx+tw+dtoff},${cy+th/2})">${seamTH}cm</text>`;
      }
      cx+=tw+gap;
    });
    cy+=row.h+rowGap;
  });

  if(isPrint){
    const sqX=totalW-60,sqY=cy+2,sq=50;
    s+=`<rect x="${sqX}" y="${sqY}" width="${sq}" height="${sq}" fill="none" stroke="#333" stroke-width=".3"/>`;
    for(let i=1;i<5;i++){
      s+=`<line x1="${sqX+i*10}" y1="${sqY}" x2="${sqX+i*10}" y2="${sqY+sq}" stroke="#ccc" stroke-width=".1"/>`;
      s+=`<line x1="${sqX}" y1="${sqY+i*10}" x2="${sqX+sq}" y2="${sqY+i*10}" stroke="#ccc" stroke-width=".1"/>`;
    }
    s+=`<text x="${sqX+sq/2}" y="${sqY-2}" text-anchor="middle" font-size="2.5" fill="#333">校验方格 5×5cm</text>`;
    s+=`<text x="${sqX+sq/2}" y="${sqY+sq+4}" text-anchor="middle" font-size="2" fill="#999">打印后请用尺量此方格，确认为5cm×5cm</text>`;
  }

  const ffs=isPrint?2.5:10;
  if(defaultSeam>0) s+=`<text x="${totalW/2}" y="${totalH-(isPrint?3:10)}" text-anchor="middle" font-size="${ffs}" fill="#b5838d">- - - 虚线为缝份线（按部位自动分配 · 缝份沿轮廓等距外扩）- - -</text>`;
  svgEl.innerHTML=s;
}

async function loadLibrary(){
  if(libData){renderLib();return;}
  libStatus.textContent='加载中...';
  libList.innerHTML='';
  try{
    const resp=await fetch('patterns.json');
    if(!resp.ok) throw new Error(resp.status);
    libData=await resp.json();
    libStatus.textContent=`共 ${libData.total} 个纸样 · 更新于 ${libData.updated} · 点击即可生成图纸`;
    renderLib();
  }catch(e){
    libStatus.textContent='';
    libList.innerHTML=`<div style="text-align:center;padding:20px;color:#aaa;font-size:12px">
      <p>暂无在线数据</p>
      <p style="margin-top:8px;font-size:10px">本地使用时，请先运行爬虫生成 patterns.json：</p>
      <code style="font-size:10px;color:#b5838d;display:block;margin-top:4px">python3 scraper/scrape.py</code>
      <p style="margin-top:8px;font-size:10px">部署到 GitHub Pages 后会自动更新</p>
    </div>`;
  }
}

function renderLib(){
  if(!libData)return;
  const q=libSearch.value.trim().toLowerCase();
  const filtered=libData.patterns.filter(p=>
    !q || p.name.toLowerCase().includes(q) || p.category.toLowerCase().includes(q) || (p.description||'').toLowerCase().includes(q)
  );
  libList.innerHTML='';
  if(!filtered.length){
    libList.innerHTML='<div style="text-align:center;padding:20px;color:#aaa;font-size:12px">无匹配结果</div>';
    return;
  }
  const cats={};
  filtered.forEach(p=>{if(!cats[p.category])cats[p.category]=[];cats[p.category].push(p);});
  Object.entries(cats).forEach(([cat,items])=>{
    const h=document.createElement('div');
    h.style.cssText='font-size:11px;color:#b5838d;font-weight:600;margin-top:4px';
    h.textContent=`${cat} (${items.length})`;
    libList.appendChild(h);
    items.forEach(p=>{
      const d=document.createElement('div');
      d.className='lib-card'+(p===libActive?' active':'');
      d.style.cursor=p.pieces&&p.pieces.length?'pointer':'default';
      let html=`<div class="lib-name">${p.name}</div>`;
      html+=`<div class="lib-meta">${p.description||''}</div>`;
      if(p.pieces&&p.pieces.length){
        html+=`<div style="margin-top:3px">${p.pieces.map(pc=>`<span class="lib-badge">${pc.label} ${pc.w}×${pc.h} ×${pc.qty}</span>`).join('')}</div>`;
      }
      html+=`<div class="lib-src">${p.source||''}${p.url?` · <a href="${p.url}" target="_blank" style="color:#c27185" onclick="event.stopPropagation()">查看原版</a>`:''}</div>`;
      d.innerHTML=html;
      if(p.pieces&&p.pieces.length) d.onclick=function(e){useOnlinePattern(p);};
      libList.appendChild(d);
    });
  });
}

libSearch.addEventListener('input',renderLib);

// === Tutorial text parser ===
function parseText(){
  const raw=document.getElementById('parseInput').value.trim();
  if(!raw){document.getElementById('parseResult').textContent='请先粘贴教程文字';return;}

  const lines=raw.split(/\n/).map(l=>l.trim()).filter(l=>l);
  const pieces=[];

  for(const line of lines){
    // skip lines that are clearly not piece descriptions
    if(line.length<3) continue;

    let label='', w=0, h=0, qty=1;

    // try to extract dimensions: various formats
    // "48×64" "48*64" "48x64" "宽48高64" "宽48cm高64cm" "长50宽4"
    const dimPatterns=[
      /(\d+(?:\.\d+)?)\s*[×xX\*]\s*(\d+(?:\.\d+)?)/,                    // 48×64, 48*64, 48x64
      /宽\s*(\d+(?:\.\d+)?)\s*(?:cm|CM|厘米)?\s*[,，]?\s*高\s*(\d+(?:\.\d+)?)/,  // 宽48高64
      /长\s*(\d+(?:\.\d+)?)\s*(?:cm|CM|厘米)?\s*[,，]?\s*宽\s*(\d+(?:\.\d+)?)/,  // 长50宽4 → w=宽, h=长
      /宽\s*(\d+(?:\.\d+)?)\s*(?:cm|CM|厘米)?\s*[,，]?\s*长\s*(\d+(?:\.\d+)?)/,  // 宽4长50
      /(\d+(?:\.\d+)?)\s*(?:cm|CM|厘米)\s*[×xX\*]\s*(\d+(?:\.\d+)?)/,    // 48cm×64cm
      /(\d+(?:\.\d+)?)\s*(?:cm|CM|厘米)\s*[,，]\s*(\d+(?:\.\d+)?)/,      // 48cm, 64cm
    ];

    let dimMatch=null;
    let isLengthWidth=false;
    for(let i=0;i<dimPatterns.length;i++){
      dimMatch=line.match(dimPatterns[i]);
      if(dimMatch){
        isLengthWidth=(i===2); // 长×宽 pattern: swap
        break;
      }
    }

    if(!dimMatch) continue; // no dimensions found, skip

    if(isLengthWidth){
      h=parseFloat(dimMatch[1]); w=parseFloat(dimMatch[2]);
    }else{
      w=parseFloat(dimMatch[1]); h=parseFloat(dimMatch[2]);
    }

    if(w<=0||h<=0||w>500||h>500) continue;

    // extract quantity
    const qtyPatterns=[
      /[×xX\*]\s*(\d+)\s*(?:片|块|条|个|份)?/,
      /(\d+)\s*(?:片|块|条|个|份)/,
      /裁\s*(\d+)/,
      /需要\s*(\d+)/,
      /共\s*(\d+)/,
    ];
    // remove the dimension part first to avoid matching dimension numbers as qty
    let restLine=line.replace(dimPatterns[0]||'','');
    for(const qp of qtyPatterns){
      const qm=restLine.match(qp);
      if(qm){qty=parseInt(qm[1]);if(qty>0&&qty<=20)break;else qty=1;}
    }

    // extract label: text before the first number or dimension
    const labelMatch=line.match(/^([^\d×xX\*]+)/);
    label=labelMatch?labelMatch[1].replace(/[：:,，\s]+$/,'').trim():'裁片';
    if(!label) label='裁片';
    // clean up common suffixes
    label=label.replace(/[（(].*/,'').replace(/尺寸$/,'').replace(/裁剪$/,'').trim();
    if(!label) label='裁片';

    pieces.push({label,w,h,qty});
  }

  const resultEl=document.getElementById('parseResult');
  const listEl=document.getElementById('parseList');

  if(!pieces.length){
    resultEl.innerHTML='<span style="color:#c27185">未识别到裁片尺寸，请检查格式</span><br><span style="font-size:10px;color:#aaa">支持格式：名称 宽×高、名称 宽48高64、名称 48cm×64cm</span>';
    listEl.innerHTML='';
    return;
  }

  resultEl.innerHTML=`<span style="color:#5a9d5a">✓ 识别到 ${pieces.length} 个裁片</span>`;

  // show parsed pieces
  listEl.innerHTML='';
  pieces.forEach((pc,i)=>{
    const d=document.createElement('div');
    d.style.cssText='display:flex;align-items:center;gap:6px;font-size:11px;padding:4px 0;border-bottom:1px solid #f5e6e9';
    d.innerHTML=`<span style="color:#5a3e3e;font-weight:500;min-width:60px">${pc.label}</span>
      <span class="lib-badge">${pc.w}×${pc.h}cm</span>
      <span style="color:#888">×${pc.qty}</span>`;
    listEl.appendChild(d);
  });

  // generate pattern
  const parsed={
    name:'教程解析',
    description:'从粘贴文字中提取',
    source:'手动输入',
    pieces:pieces
  };
  cur=null;
  libActive=parsed;
  document.querySelectorAll('.tpl-card').forEach(c=>c.classList.remove('active'));
  drawOnline(parsed);
  collapseOnMobile();
}

// === Print function (iOS/iPadOS compatible) ===
function doPrint(){
  // enable print mode and redraw synchronously
  printEl.checked=true;
  draw();
  // window.print() must be called synchronously in user gesture for iOS Safari
  window.print();
  // after print dialog closes, optionally restore preview mode
  printEl.checked=false;
  draw();
}

// === Export SVG as image (fallback for devices without print) ===
function exportImage(){
  const svgData=svgEl.outerHTML;
  const blob=new Blob([svgData],{type:'image/svg+xml'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download='裁片图纸.svg';
  a.click();
  URL.revokeObjectURL(url);
}

// === Mobile responsive ===
const sidePanel=document.getElementById('sidePanel');
const isMobile=()=>window.innerWidth<=768;

function togglePanel(){
  sidePanel.classList.toggle('collapsed');
  const btn=document.querySelector('.mobile-toggle');
  btn.textContent=sidePanel.classList.contains('collapsed')?'展开面板':'收起面板';
}

function collapseOnMobile(){
  if(isMobile()){
    sidePanel.classList.add('collapsed');
    document.querySelector('.mobile-toggle').textContent='展开面板';
    window.scrollTo({top:0,behavior:'smooth'});
  }
}

// on desktop/iPad, always show panel
if(!isMobile()) sidePanel.classList.remove('collapsed');
window.addEventListener('resize',()=>{
  if(!isMobile()) sidePanel.classList.remove('collapsed');
  draw(); // redraw on resize/rotation for responsive layout
});

// patch local template clicks to auto-collapse on mobile
document.querySelectorAll('.tpl-card').forEach(card=>{
  const origClick=card.onclick;
  card.onclick=function(e){origClick.call(this,e);collapseOnMobile();};
});
</script>
