<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>缝纫裁片图纸生成工具</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'PingFang SC','Microsoft YaHei','Helvetica Neue',sans-serif;background:#fdf2f4;min-height:100vh}
.wrap{display:flex;min-height:100vh}
aside{width:300px;background:#fff;border-right:1px solid #f5d5d9;padding:16px;display:flex;flex-direction:column;gap:12px;flex-shrink:0;overflow-y:auto;max-height:100vh}
aside h1{font-size:17px;font-weight:600;color:#9d4c5a;letter-spacing:1px}
.tabs{display:flex;gap:0;border:1px solid #f0c4ca;border-radius:8px;overflow:hidden}
.tab{flex:1;padding:7px 0;text-align:center;font-size:12px;cursor:pointer;background:#fff;color:#999;border:none;transition:all .15s}
.tab.active{background:#fff0f3;color:#c27185;font-weight:600}
.tab-panel{display:none;flex-direction:column;gap:8px;flex:1;overflow-y:auto}
.tab-panel.show{display:flex}
.ctrl-row{display:flex;gap:8px;align-items:flex-end}
.ctrl-row>div{flex:1}
label{display:block;font-size:12px;color:#888;margin-bottom:3px}
input[type=number],select,input[type=text]{width:100%;border:1px solid #f0c4ca;border-radius:8px;padding:6px 10px;font-size:13px;outline:none;background:#fff}
input:focus,select:focus{border-color:#d4889a;box-shadow:0 0 0 3px rgba(212,136,154,.15)}
.cat-title{font-size:12px;color:#b5838d;font-weight:600;margin:8px 0 4px;padding-left:2px;letter-spacing:.5px;cursor:pointer;user-select:none;display:flex;align-items:center;gap:4px}
.cat-title::before{content:'▸';font-size:10px;transition:transform .2s;display:inline-block}
.cat-title.open::before{transform:rotate(90deg)}
.cat-items{display:none;flex-direction:column;gap:4px;padding-left:2px}
.cat-items.show{display:flex}
.tpl-card{cursor:pointer;border:1px solid #f5d5d9;border-radius:8px;padding:7px 10px;transition:all .15s}
.tpl-card:hover{transform:translateY(-1px);box-shadow:0 2px 8px rgba(0,0,0,.05)}
.tpl-card.active{border-color:#c27185;background:#fff0f3}
.tpl-name{font-size:12px;font-weight:500;color:#444}
.tpl-desc{font-size:10px;color:#aaa;margin-top:1px}
.lib-card{border:1px solid #f0e0e3;border-radius:8px;padding:8px 10px}
.lib-card .lib-name{font-size:12px;font-weight:500;color:#444}
.lib-card .lib-meta{font-size:10px;color:#aaa;margin-top:2px}
.lib-card .lib-src{font-size:9px;color:#c9a;margin-top:2px}
.lib-badge{display:inline-block;font-size:9px;background:#f5e6e9;color:#b5838d;padding:1px 6px;border-radius:4px;margin-right:4px}
.btn-row{display:flex;gap:8px;margin-top:auto;padding-top:8px;flex-shrink:0}
.btn{flex:1;border:none;border-radius:8px;padding:10px 0;font-size:13px;font-weight:500;cursor:pointer;transition:background .2s}
.btn-print{background:#d4889a;color:#fff}.btn-print:hover{background:#c27185}
.btn-reset{background:#f5e6e9;color:#9d4c5a}.btn-reset:hover{background:#f0d4da}
main{flex:1;display:flex;align-items:flex-start;justify-content:center;padding:24px;overflow:auto}
#canvas-wrap{background:#fff;border-radius:12px;box-shadow:0 2px 16px rgba(0,0,0,.04);border:1px solid #f5d5d9;padding:20px;display:inline-block}
@media print{
  aside,.no-print{display:none!important}
  body{background:#fff!important;margin:0;padding:0}
  .wrap{display:block}
  main{padding:5mm;display:block}
  #canvas-wrap{border:none!important;box-shadow:none!important;margin:0!important;padding:0!important;border-radius:0!important}
  #svgCanvas{width:auto!important;height:auto!important}
  @page{size:A4;margin:8mm}
}
</style>
</head>
<body>
<div class="wrap">
  <aside class="no-print">
    <h1>🧵 裁片图纸工具</h1>
    <div class="tabs">
      <div class="tab active" onclick="switchTab('local')">内置模板</div>
      <div class="tab" onclick="switchTab('online')">在线纸样库</div>
    </div>

    <!-- 内置模板面板 -->
    <div id="panelLocal" class="tab-panel show">
      <div class="ctrl-row">
        <div><label>缝份 (cm)</label><input id="seamInput" type="number" value="1.5" min="0" max="5" step="0.1"/></div>
        <div><label>预览缩放</label><select id="scaleInput"><option value="3">小</option><option value="4" selected>中</option><option value="6">大</option></select></div>
      </div>
      <div>
        <label><input type="checkbox" id="printMode" style="margin-right:4px"/>打印模式 (1:1 真实尺寸)</label>
        <p style="font-size:10px;color:#aaa;margin-top:2px">勾选后图纸按实际cm尺寸输出，打印时请选100%不缩放</p>
      </div>
      <div id="templateList" style="flex:1;overflow-y:auto"></div>
    </div>

    <!-- 在线纸样库面板 -->
    <div id="panelOnline" class="tab-panel">
      <input type="text" id="libSearch" placeholder="搜索纸样名称或分类..." style="margin-bottom:4px"/>
      <div id="libStatus" style="font-size:10px;color:#aaa"></div>
      <div id="libList" style="flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:6px"></div>
    </div>

    <div class="btn-row">
      <button class="btn btn-reset" onclick="document.getElementById('seamInput').value='1.5';draw()">重置缝份</button>
      <button class="btn btn-print" onclick="document.getElementById('printMode').checked=true;draw();setTimeout(()=>window.print(),100)">🖨️ 打印</button>
    </div>
  </aside>
  <main><div id="canvas-wrap"><svg id="svgCanvas" xmlns="http://www.w3.org/2000/svg"></svg></div></main>
</div>

    {label:'六边形',qty:1,nw:36,nh:31,path:'M9,0 L27,0 L36,15.5 L27,31 L9,31 L0,15.5 Z',notes:'边长18'},
  ]},
  {name:'椭圆形布片',desc:'长40×宽28 包底/装饰',pieces:[
    {label:'椭圆布片',qty:1,nw:40,nh:28,path:'M20,0 A20,14 0 1,1 20,28 A20,14 0 1,1 20,0 Z',notes:'长40 宽28'},
  ]},
]},
];
let cur={ci:0,ii:0};
const seamEl=document.getElementById('seamInput');
const scaleEl=document.getElementById('scaleInput');
const svgEl=document.getElementById('svgCanvas');
const listEl=document.getElementById('templateList');

PROJECTS.forEach((c,ci)=>{
  const h=document.createElement('div');
  h.className='cat-title'+(ci===0?' open':'');
  h.textContent=c.cat;
  const box=document.createElement('div');
  box.className='cat-items'+(ci===0?' show':'');
  h.onclick=()=>{h.classList.toggle('open');box.classList.toggle('show');};
  listEl.appendChild(h);
  c.items.forEach((t,ii)=>{
    const d=document.createElement('div');
    d.className='tpl-card'+(ci===0&&ii===0?' active':'');
    d.innerHTML=`<div class="tpl-name">${t.name}</div><div class="tpl-desc">${t.desc}</div>`;
    d.onclick=()=>{cur={ci,ii};document.querySelectorAll('.tpl-card').forEach(x=>x.classList.remove('active'));d.classList.add('active');draw();};
    box.appendChild(d);
  });
  listEl.appendChild(box);
});

const printEl=document.getElementById('printMode');

function draw(){
  const seam=parseFloat(seamEl.value)||0;
  const isPrint=printEl.checked;
  // In print mode: 1 SVG unit = 1mm (so nw cm = nw*10 units)
  // In preview mode: 1 SVG unit = sc pixels per cm
  const PX_PER_CM=isPrint?10:parseInt(scaleEl.value)||4;
  const proj=PROJECTS[cur.ci].items[cur.ii];
  const pieces=proj.pieces;
  const gap=isPrint?15:40; // mm or px gap between pieces
  const mg=isPrint?20:60;
  const pieceBoxes=[];

  pieces.forEach(p=>{
    const sp=seam*PX_PER_CM;
    const tw=p.nw*PX_PER_CM+sp*2;
    const th=p.nh*PX_PER_CM+sp*2;
    pieceBoxes.push({p,tw,th,sp});
  });

  // A4 printable area in mm: ~194 x ~277 (with 8mm margins)
  const maxRowW=isPrint?194*10/10:900; // 194mm in print, 900px in preview
  const rows=[];
  let rowItems=[],rowW=0,rowH=0;
  pieceBoxes.forEach(b=>{
    const bw=b.tw+mg;
    if(rowW+bw>maxRowW && rowItems.length>0){
      rows.push({items:rowItems,w:rowW,h:rowH});
      rowItems=[];rowW=0;rowH=0;
    }
    rowItems.push(b);
    rowW+=bw;
    rowH=Math.max(rowH,b.th);
  });
  if(rowItems.length) rows.push({items:rowItems,w:rowW,h:rowH});

  const titleH=isPrint?12:40;
  const footerH=isPrint?8:30;
  const testSquareH=isPrint?65:0; // space for 5cm test square
  const rowGap=isPrint?mg+8:mg+20;
  const totalH=titleH+10+rows.reduce((s,r)=>s+r.h+rowGap,0)+footerH+testSquareH;
  const totalW=Math.max(isPrint?194:600,...rows.map(r=>r.w+mg*2));

  if(isPrint){
    // Use mm units for 1:1 printing
    svgEl.setAttribute('width',totalW+'mm');
    svgEl.setAttribute('height',totalH+'mm');
  }else{
    svgEl.setAttribute('width',totalW);
    svgEl.setAttribute('height',totalH);
  }
  svgEl.setAttribute('viewBox',`0 0 ${totalW} ${totalH}`);

  let s=`<style>text{font-family:'PingFang SC','Microsoft YaHei',sans-serif}</style>`;

  // title
  const fs=isPrint?4:16, fs2=isPrint?3:11;
  s+=`<text x="${totalW/2}" y="${isPrint?5:26}" text-anchor="middle" font-size="${fs}" fill="#5a3e3e" font-weight="600">${proj.name}</text>`;
  s+=`<text x="${totalW/2}" y="${isPrint?10:40}" text-anchor="middle" font-size="${fs2}" fill="#b5838d">${proj.desc}${seam>0?' ｜ 缝份'+seam+'cm':''}</text>`;

  let cy=titleH+5;

  rows.forEach(row=>{
    let cx=Math.max(mg,(totalW-row.w)/2);
    row.items.forEach(b=>{
      const{p,tw,th,sp}=b;
      const ox=cx+sp;
      const oy=cy+sp;

      if(seam>0)
        s+=`<rect x="${cx}" y="${cy}" width="${tw}" height="${th}" fill="none" stroke="#d4a0a0" stroke-width="${isPrint?.2:.8}" stroke-dasharray="${isPrint?'2,1':'5,3'}" rx="${isPrint?1:2}"/>`;

      s+=`<g transform="translate(${ox},${oy}) scale(${PX_PER_CM})">`;
      s+=`<path d="${p.path}" fill="${isPrint?'none':'#fff8f8'}" stroke="#5a3e3e" stroke-width="${(isPrint?.08:1.2)/PX_PER_CM}" stroke-linejoin="round"/>`;
      s+=`</g>`;

      // grain arrow
      const ax=ox+p.nw*PX_PER_CM/2;
      const ay1=oy+p.nh*PX_PER_CM*.25;
      const ay2=oy+p.nh*PX_PER_CM*.65;
      const minArrow=isPrint?10:30;
      if(p.nh*PX_PER_CM>minArrow){
        s+=`<line x1="${ax}" y1="${ay1}" x2="${ax}" y2="${ay2}" stroke="#ccc" stroke-width="${isPrint?.15:.8}"/>`;
        const as=isPrint?1.5:5;
        s+=`<polygon points="${ax},${ay1-as} ${ax-as*.6},${ay1+as*.4} ${ax+as*.6},${ay1+as*.4}" fill="#ccc"/>`;
      }

      // label
      const lfs=isPrint?3:12, nfs=isPrint?2.2:9;
      const qtyStr=p.qty>1?` ×${p.qty}`:'';
      s+=`<text x="${ox+p.nw*PX_PER_CM/2}" y="${oy+p.nh*PX_PER_CM/2-lfs*.4}" text-anchor="middle" font-size="${lfs}" fill="#5a3e3e" font-weight="600" dominant-baseline="middle">${p.label}${qtyStr}</text>`;
      if(p.notes)
        s+=`<text x="${ox+p.nw*PX_PER_CM/2}" y="${oy+p.nh*PX_PER_CM/2+lfs*.6}" text-anchor="middle" font-size="${nfs}" fill="#b5838d" dominant-baseline="middle">${p.notes}</text>`;

      // dimensions
      const dimC='#777',dfs=isPrint?2.2:9,doff=isPrint?3:12,dtoff=isPrint?5:18,dsw=isPrint?.1:.6;
      // width on top
      s+=`<line x1="${ox}" y1="${oy-doff}" x2="${ox+p.nw*PX_PER_CM}" y2="${oy-doff}" stroke="${dimC}" stroke-width="${dsw}"/>`;
      s+=`<line x1="${ox}" y1="${oy-doff-1.5}" x2="${ox}" y2="${oy-doff+1.5}" stroke="${dimC}" stroke-width="${dsw}"/>`;
      s+=`<line x1="${ox+p.nw*PX_PER_CM}" y1="${oy-doff-1.5}" x2="${ox+p.nw*PX_PER_CM}" y2="${oy-doff+1.5}" stroke="${dimC}" stroke-width="${dsw}"/>`;
      s+=`<text x="${ox+p.nw*PX_PER_CM/2}" y="${oy-dtoff}" text-anchor="middle" font-size="${dfs}" fill="${dimC}">${p.nw}cm</text>`;
      // height on left
      s+=`<line x1="${ox-doff}" y1="${oy}" x2="${ox-doff}" y2="${oy+p.nh*PX_PER_CM}" stroke="${dimC}" stroke-width="${dsw}"/>`;
      s+=`<line x1="${ox-doff-1.5}" y1="${oy}" x2="${ox-doff+1.5}" y2="${oy}" stroke="${dimC}" stroke-width="${dsw}"/>`;
      s+=`<line x1="${ox-doff-1.5}" y1="${oy+p.nh*PX_PER_CM}" x2="${ox-doff+1.5}" y2="${oy+p.nh*PX_PER_CM}" stroke="${dimC}" stroke-width="${dsw}"/>`;
      s+=`<text x="${ox-dtoff}" y="${oy+p.nh*PX_PER_CM/2}" text-anchor="middle" font-size="${dfs}" fill="${dimC}" dominant-baseline="middle" transform="rotate(-90,${ox-dtoff},${oy+p.nh*PX_PER_CM/2})">${p.nh}cm</text>`;

      if(seam>0){
        const sfs=isPrint?2:8;
        s+=`<text x="${cx+tw/2}" y="${cy+th+sfs*1.5}" text-anchor="middle" font-size="${sfs}" fill="#b5838d">含缝份 ${(p.nw+seam*2).toFixed(1)}×${(p.nh+seam*2).toFixed(1)}</text>`;
      }

      cx+=tw+gap;
    });
    cy+=row.h+rowGap;
  });

  // Test square (print mode only)
  if(isPrint){
    const sqX=totalW-60, sqY=cy+2;
    const sq=50; // 5cm = 50mm
    s+=`<rect x="${sqX}" y="${sqY}" width="${sq}" height="${sq}" fill="none" stroke="#333" stroke-width=".3"/>`;
    // grid lines every 1cm
    for(let i=1;i<5;i++){
      s+=`<line x1="${sqX+i*10}" y1="${sqY}" x2="${sqX+i*10}" y2="${sqY+sq}" stroke="#ccc" stroke-width=".1"/>`;
      s+=`<line x1="${sqX}" y1="${sqY+i*10}" x2="${sqX+sq}" y2="${sqY+i*10}" stroke="#ccc" stroke-width=".1"/>`;
    }
    s+=`<text x="${sqX+sq/2}" y="${sqY-2}" text-anchor="middle" font-size="2.5" fill="#333">校验方格 5×5cm</text>`;
    s+=`<text x="${sqX+sq/2}" y="${sqY+sq+4}" text-anchor="middle" font-size="2" fill="#999">打印后请用尺量此方格，确认为5cm×5cm</text>`;
    s+=`<text x="${sqX+sq/2}" y="${sqY+sq+7}" text-anchor="middle" font-size="2" fill="#999">打印设置：缩放100%，无边距或最小边距</text>`;
  }

  // footer
  const ffs=isPrint?2.5:10;
  if(seam>0)
    s+=`<text x="${totalW/2}" y="${totalH-(isPrint?3:10)}" text-anchor="middle" font-size="${ffs}" fill="#b5838d">- - - 虚线为缝份线（缝份 ${seam}cm）- - -</text>`;

  svgEl.innerHTML=s;
}

seamEl.addEventListener('input',draw);
scaleEl.addEventListener('change',draw);
printEl.addEventListener('change',draw);
draw();

// === Tab switching ===
function switchTab(tab){
  document.querySelectorAll('.tab').forEach((t,i)=>{
    t.classList.toggle('active',i===(tab==='local'?0:1));
  });
  document.getElementById('panelLocal').classList.toggle('show',tab==='local');
  document.getElementById('panelOnline').classList.toggle('show',tab==='online');
  if(tab==='online') loadLibrary();
}

// === Online pattern library ===
let libData=null;
const libList=document.getElementById('libList');
const libStatus=document.getElementById('libStatus');
const libSearch=document.getElementById('libSearch');

async function loadLibrary(){
  if(libData){renderLib();return;}
  libStatus.textContent='加载中...';
  libList.innerHTML='';
  try{
    const resp=await fetch('patterns.json');
    if(!resp.ok) throw new Error(resp.status);
    libData=await resp.json();
    libStatus.textContent=`共 ${libData.total} 个纸样 · 更新于 ${libData.updated}`;
    renderLib();
  }catch(e){
    libStatus.textContent='';
    libList.innerHTML=`<div style="text-align:center;padding:20px;color:#aaa;font-size:12px">
      <p>暂无在线数据</p>
      <p style="margin-top:8px;font-size:10px">本地使用时，请先运行爬虫生成 patterns.json：</p>
      <code style="font-size:10px;color:#b5838d;display:block;margin-top:4px">python3 scraper/scrape.py</code>
      <p style="margin-top:8px;font-size:10px">部署到 GitHub Pages 后会自动更新</p>
    </div>`;
  }
}

function renderLib(){
  if(!libData)return;
  const q=libSearch.value.trim().toLowerCase();
  const filtered=libData.patterns.filter(p=>
    !q || p.name.toLowerCase().includes(q) || p.category.toLowerCase().includes(q) || (p.description||'').toLowerCase().includes(q)
  );
  libList.innerHTML='';
  if(!filtered.length){
    libList.innerHTML='<div style="text-align:center;padding:20px;color:#aaa;font-size:12px">无匹配结果</div>';
    return;
  }
  // group by category
  const cats={};
  filtered.forEach(p=>{if(!cats[p.category])cats[p.category]=[];cats[p.category].push(p);});
  Object.entries(cats).forEach(([cat,items])=>{
    const h=document.createElement('div');
    h.style.cssText='font-size:11px;color:#b5838d;font-weight:600;margin-top:4px';
    h.textContent=`${cat} (${items.length})`;
    libList.appendChild(h);
    items.forEach(p=>{
      const d=document.createElement('div');
      d.className='lib-card';
      let html=`<div class="lib-name">${p.name}</div>`;
      html+=`<div class="lib-meta">${p.description||''}</div>`;
      if(p.pieces&&p.pieces.length){
        html+=`<div style="margin-top:3px">${p.pieces.map(pc=>`<span class="lib-badge">${pc.label} ${pc.w}×${pc.h} ×${pc.qty}</span>`).join('')}</div>`;
      }
      html+=`<div class="lib-src">${p.source||''}${p.url?` · <a href="${p.url}" target="_blank" style="color:#c27185">查看原版</a>`:''}</div>`;
      d.innerHTML=html;
      libList.appendChild(d);
    });
  });
}

libSearch.addEventListener('input',renderLib);
</script>
